<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Missions — Mission Academy</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="math-theme">

<nav class="top-nav">
  <a href="index.html" class="nav-logo">🚀 Mission <span>Academy</span></a>
  <div style="display:flex;align-items:center;gap:12px;">
    <span class="nav-student-name" id="navName"></span>
    <div class="nav-tabs">
      <a href="math.html" class="nav-tab active-math">➕ Math</a>
      <a href="ela.html"  class="nav-tab">📖 ELA</a>
      <a href="trophies.html" class="nav-tab">🏆</a>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="page-eyebrow math-accent">2nd Grade · 30 Missions</div>
  <h1 class="page-title">Math Missions</h1>
  <p class="page-subtitle">Conquer every mission to become a Math Master Explorer!</p>
</div>

<div class="missions-grid" id="missionsGrid"></div>

<!-- LOCK MODAL -->
<div class="modal-overlay hidden" id="lockModal">
  <div class="modal-box">
    <button class="q-close-btn" onclick="closeLockModal()">✕</button>
    <div class="lock-icon">🔒</div>
    <h2 class="lock-title">Checkpoint Mission</h2>
    <p class="lock-desc">Ask your teacher for the unlock code to continue!</p>
    <input class="lock-input" id="lockInput" type="password" placeholder="Enter code" maxlength="12">
    <div class="lock-error" id="lockError"></div>
    <button class="lock-submit" onclick="submitLockCode()">Unlock Mission</button>
    <button class="lock-cancel" onclick="closeLockModal()">Go back</button>
  </div>
</div>

<!-- QUESTION MODAL -->
<div class="modal-overlay hidden" id="questionModal">
  <div class="modal-box">
    <button class="q-close-btn" onclick="closeQuestionModal()">✕</button>
    <div class="q-header">
      <div>
        <div class="q-mission-label math-accent" id="qMissionLabel"></div>
        <div class="q-number" id="qNumber"></div>
      </div>
      <div class="q-progress-bar"><div class="q-progress-fill" id="qProgressFill" style="width:0%"></div></div>
    </div>
    <div class="q-text" id="qText"></div>
    <div id="qAnswerArea"></div>
    <div class="q-feedback" id="qFeedback"></div>
    <div id="qActionArea"></div>
  </div>
</div>

<!-- RESULT MODAL -->
<div class="modal-overlay hidden" id="resultModal">
  <div class="modal-box">
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-score" id="resultScore"></div>
    <div class="result-subtitle" id="resultSubtitle"></div>
    <div class="result-btns">
      <button class="result-btn primary" onclick="retryMission()">Try Again</button>
      <button class="result-btn secondary" onclick="closeResultModal()">Mission List</button>
    </div>
  </div>
</div>

<script src="engine.js"></script>
<script>
const SUBJECT = 'math';
const ME = window.MissionEngine;
let currentMission = null, questions = [], qIndex = 0, score = 0, answered = false, pendingLock = null;

document.getElementById('navName').textContent = ME.getStudentName() || '';

function buildGrid() {
  const grid = document.getElementById('missionsGrid');
  grid.innerHTML = '';
  const sections = [
    {from:1,to:5,label:'Missions 1–5 · Addition & Subtraction Within 20'},
    {from:6,to:10,label:'Missions 6–10 · Skip Counting, Even/Odd, Word Problems'},
    {from:11,to:15,label:'Missions 11–15 · Place Value & Word Problems'},
    {from:16,to:20,label:'Missions 16–20 · Comparing Numbers'},
    {from:21,to:25,label:'Missions 21–25 · Addition & Subtraction with Regrouping'},
    {from:26,to:30,label:'Missions 26–30 · Mixed Review'},
  ];
  for (const section of sections) {
    const div = document.createElement('div');
    div.className = 'section-label';
    div.innerHTML = `<span>${section.label}</span>`;
    grid.appendChild(div);
    for (let n = section.from; n <= section.to; n++) {
      const locked = ME.isLocked(n) && !ME.isUnlocked(n, SUBJECT);
      const best = ME.getBest(n, SUBJECT);
      const btn = document.createElement('button');
      btn.className = 'mission-btn' + (locked?' locked':'') + (best!==null?' completed':'');
      btn.innerHTML = `
        <div class="mission-number">Mission ${n}</div>
        <div class="mission-name">${ME.mathMissionInfo[n]}</div>
        ${best!==null?`<div class="mission-score${best<14?' low':''}">Best: ${best}/20</div>`:''}
      `;
      btn.addEventListener('click', () => clickMission(n, locked));
      grid.appendChild(btn);
    }
  }
}

function clickMission(n, locked) {
  if (locked) {
    pendingLock = n;
    document.getElementById('lockInput').value = '';
    document.getElementById('lockError').textContent = '';
    document.getElementById('lockModal').classList.remove('hidden');
    setTimeout(() => document.getElementById('lockInput').focus(), 50);
  } else { startMission(n); }
}

function closeLockModal() { document.getElementById('lockModal').classList.add('hidden'); pendingLock = null; }
function submitLockCode() {
  const code = document.getElementById('lockInput').value.trim().toUpperCase();
  if (ME.unlockMission(pendingLock, SUBJECT, code)) {
    closeLockModal(); buildGrid(); startMission(pendingLock);
  } else {
    document.getElementById('lockError').textContent = 'That code is not correct. Ask your teacher!';
  }
}
document.getElementById('lockInput').addEventListener('keydown', e => { if(e.key==='Enter') submitLockCode(); });

function startMission(n) {
  currentMission = n; questions = ME.shuffle(ME.mathGenerators[n]()); qIndex = 0; score = 0;
  document.getElementById('qMissionLabel').textContent = `Mission ${n} — Math`;
  document.getElementById('questionModal').classList.remove('hidden');
  showQuestion();
}

function showQuestion() {
  const q = questions[qIndex]; answered = false;
  document.getElementById('qNumber').textContent = `Question ${qIndex+1} of ${questions.length}`;
  document.getElementById('qProgressFill').style.width = `${(qIndex/questions.length)*100}%`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('qFeedback').textContent = '';
  document.getElementById('qFeedback').className = 'q-feedback';
  const ansArea = document.getElementById('qAnswerArea');
  const actArea = document.getElementById('qActionArea');
  if (q.type === 'choice') {
    ansArea.innerHTML = `<div class="q-choices">${q.choices.map(c=>`<button class="q-choice-btn" onclick="checkChoice(this,'${c.replace(/'/g,"\\'")}','${q.answer.replace(/'/g,"\\'")}')"> ${c} </button>`).join('')}</div>`;
    actArea.innerHTML = '';
  } else {
    ansArea.innerHTML = `<div class="q-input-row"><input class="q-input" id="answerInput" type="text" placeholder="Type your answer…" autocomplete="off"><button class="q-submit-btn" onclick="checkInput()">Check</button></div>`;
    actArea.innerHTML = '';
    setTimeout(() => {
      const inp = document.getElementById('answerInput');
      if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if(e.key==='Enter'&&!answered) checkInput(); }); }
    }, 50);
  }
}

function checkChoice(btn, chosen, correct) {
  if (answered) return; answered = true;
  const all = btn.closest('.q-choices').querySelectorAll('.q-choice-btn');
  all.forEach(b => b.disabled = true);
  if (chosen.trim().toLowerCase() === correct.trim().toLowerCase()) {
    btn.classList.add('correct'); score++; ME.AudioFX.correct(); showFeedback(true, correct);
  } else {
    btn.classList.add('wrong'); ME.AudioFX.wrong();
    all.forEach(b => { if(b.textContent.trim().toLowerCase()===correct.trim().toLowerCase()) b.classList.add('correct'); });
    showFeedback(false, correct);
  }
  showNext();
}

function checkInput() {
  if (answered) return;
  const inp = document.getElementById('answerInput'); if (!inp) return;
  const val = inp.value.trim().toLowerCase(), correct = questions[qIndex].answer.trim().toLowerCase();
  answered = true; inp.disabled = true;
  if (val === correct) { inp.classList.add('correct'); score++; ME.AudioFX.correct(); showFeedback(true, questions[qIndex].answer); }
  else { inp.classList.add('wrong'); ME.AudioFX.wrong(); showFeedback(false, questions[qIndex].answer); }
  showNext();
}

function showFeedback(ok, answer) {
  const fb = document.getElementById('qFeedback');
  fb.className = 'q-feedback ' + (ok?'correct':'wrong');
  fb.textContent = ok ? '✓ Correct!' : `✗ The answer is: ${answer}`;
}

function showNext() {
  const isLast = qIndex+1 >= questions.length;
  document.getElementById('qActionArea').innerHTML = `<button class="q-next-btn" onclick="${isLast?'finishMission':'nextQuestion'}()">${isLast?'🏁 See Results':'Next Question →'}</button>`;
}

function nextQuestion() { qIndex++; showQuestion(); }
function closeQuestionModal() { document.getElementById('questionModal').classList.add('hidden'); currentMission=null; }

function finishMission() {
  document.getElementById('questionModal').classList.add('hidden');
  ME.markComplete(currentMission, SUBJECT, score);
  buildGrid();
  const pct = Math.round((score/questions.length)*100);
  const emoji = pct===100?'🏆':pct>=80?'🌟':pct>=60?'👍':'💪';
  if (pct===100) ME.AudioFX.perfect(); else ME.AudioFX.complete();
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = pct===100?'Perfect Score!':pct>=80?'Great Work!':pct>=60?'Good Job!':'Keep Practicing!';
  document.getElementById('resultScore').textContent = `${score} / ${questions.length}`;
  document.getElementById('resultSubtitle').textContent = `That's ${pct}% — Mission ${currentMission} complete!`;
  document.getElementById('resultModal').classList.remove('hidden');
}

function retryMission() { document.getElementById('resultModal').classList.add('hidden'); startMission(currentMission); }
function closeResultModal() { document.getElementById('resultModal').classList.add('hidden'); currentMission=null; }

buildGrid();
</script>
</body>
</html>
